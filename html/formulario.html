<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de formulario</title>
</head>
<body>
    <!--checkouts-->
   
    <label>input de texto</label><br>
    <input type="text" placeholder="Informe seu nome"/><br>
   
    <label>Input de senha</label><br>
    <input type="password"/><br>
   
    <label>Input de email</label><br>
    <input type="email" placeholder="ex.: jocar@gmail.com"/><br>
   
    <input type="radio" name="sexo" value="masculino"/>
    <label>Masculino</label>
    
    <input type="radio" name="sexo" value="ferminino"/>
    <label>Ferminino</label>

    <input type="radio" name="sexo" value="outros"/>
    <label>Desejo não informar</label>

    <h3>Estilos de Filmes</h3>
    <input type="checkbox" name="filme" value="comédia">
    <label > Comédia</label>

    <input type="checkbox" name="filme" value="ação">
    <label > Ação</label>

    <input type="checkbox" name="filme" value="terror">
    <label > Terror</label>

    <input type="checkbox" name="filme" value="romançe">
    <label >Romançe</label>

    <!-- lista de  opçoes-->

    <h3>Qual a sua fruta preferida?</h3>
    <select name="fruta">
        <option value="">Selecione uma opção</option>
        <option value="Pera">Pera</option>
        <option value="Uva">Uva</option>
        <option value="Manga">Manga</option>
        <option value="Goiaba">Goiaba</option>
    
    </select>
    
    <h3>Quais são as sua frutas preferidas?</h3>
    <select name="" multiple size="10">
      
        <option value="Pera">Pera</option>
        <option value="Uva">Uva</option>
        <option value="Manga">Manga</option>
        <option value="Goiaba">Goiaba</option>
        <option value="Melancia">Melancia</option>
        <option value="Banana">Banana</option>
        <option value="Coco">Coco</option>
        <option value="Kwi">Kwi</option>
        <option value="Abacaxi">Abacaxi</option>
    </select>
</body>
</html>
